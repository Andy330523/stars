<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>作品集</title>

<style>
/* ===== 放大图与信息面板 ===== */
  .work-title-wrap{
  margin-bottom:24px;
}

.work-title-btn{
  position:relative;
  background:none;
  border:none;
  padding:0 0 8px 0;
  color:#e5e7eb;
  font-size:34px;
  font-weight:700;
  letter-spacing:0.5px;
  cursor:url("images/pointer.png") 6 0, pointer;
}

.work-title-btn::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg, #8b5cf6, #22d3ee);
  transform:scaleX(0);
  transform-origin:left;
  transition:transform 0.3s ease;
  box-shadow:0 0 8px rgba(34,211,238,0.35);
}

.work-title-btn:hover::after{
  transform:scaleX(1);
}

.work-title-btn:hover{
  color:#ffffff;
  text-shadow:0 0 8px #8b5cf6, 0 0 15px #22d3ee;
}
.zoom-wrapper{
  display:flex;
  gap:24px;
  align-items:flex-start;
  flex-wrap:wrap;
}

.image-box{
  position:relative;
  width:100%;
  max-width:620px;
  border-radius:16px;
  overflow:hidden;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 20px rgba(0,0,0,0.25);
}

.image-box img{
  width:100%;
  display:block;
}

.lens{
  position:absolute;
  width:140px;
  height:140px;
  border:2px solid rgba(255,255,255,0.85);
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 12px rgba(255,255,255,0.15);
  border-radius:12px;
  pointer-events:none;
  display:none;
}

.result-box{
  width:320px;
  height:320px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.08);
  background-color:rgba(255,255,255,0.03);
  background-repeat:no-repeat;
  background-position:center;
  box-shadow:0 0 20px rgba(0,0,0,0.25);
  display:none;
}

.info-button-wrap{
  margin-top:24px;
}

.info-btn{
  background:rgba(255,255,255,0.06);
  color:#e5e7eb;
  border:1px solid rgba(255,255,255,0.12);
  padding:12px 20px;
  border-radius:12px;
  font-size:15px;
  font-weight:600;
  transition:0.3s;
}

.info-btn:hover{
  background:rgba(255,255,255,0.12);
  box-shadow:0 0 12px rgba(139,92,246,0.35);
}

.info-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(3px);
  opacity:0;
  visibility:hidden;
  transition:0.35s;
  z-index:20;
}

.info-overlay.show{
  opacity:1;
  visibility:visible;
}

.info-panel{
  position:fixed;
  top:0;
  right:0;
  width:380px;
  max-width:90vw;
  height:100vh;
  background:rgba(10,15,26,0.96);
  border-left:1px solid rgba(255,255,255,0.08);
  box-shadow:-10px 0 30px rgba(0,0,0,0.35);
  transform:translateX(100%);
  transition:transform 0.35s ease;
  z-index:30;
  display:flex;
  flex-direction:column;
}

.info-panel.show{
  transform:translateX(0);
}

.info-panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 20px 16px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.info-panel-header h2{
  margin:0;
  font-size:22px;
}

.close-btn{
  background:none;
  border:none;
  color:#e5e7eb;
  font-size:28px;
  line-height:1;
}

.info-panel-content{
  padding:20px;
  overflow-y:auto;
}

.info-item{
  display:flex;
  flex-direction:column;
  gap:6px;
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.info-label{
  font-size:13px;
  color:#94a3b8;
}

.info-value{
  font-size:16px;
  color:#e5e7eb;
}

@media (max-width: 900px){
  .result-box{
    width:100%;
    max-width:620px;
    height:260px;
  }
}

/* ===== 页面切换动画（只作用在内容层） ===== */
.page-exit .page-content {
  animation: slideOut 0.5s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
}

@keyframes slideOut {
  from { transform: translateX(0); }
  to   { transform: translateX(-100%); }
}

/* ===== 当前页面导航高亮 ===== */
.nav-link.active,
#brand.active {
  color: #ffffff;
  text-shadow: 0 0 8px #8b5cf6, 0 0 15px #22d3ee;
}

/* ===== 星空背景 ===== */
#galaxy-bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  display: block;
}

/* ===== 页面内容层 ===== */
.page-content {
  position: relative;
  z-index: 1;
}

/* ===== 全局 ===== */
body {
  font-family: system-ui, sans-serif;
  background: #0b0f1a;
  color: #e5e7eb;
  margin: 0;
  line-height: 1.6;
  cursor: url("images/cursor.png") 4 4, auto;
}

a, button, .nav-link, #brand {
  cursor: url("images/pointer.png") 6 0, pointer;
}

/* ===== 顶栏 ===== */
header {
  position: sticky;
  top: 0;
  background: rgba(10, 15, 26, 0.85);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  padding: 10px 20px;
  display: flex;
  align-items: center;
}

.nav-left {
  display: flex;
  align-items: center;
}

#brand {
  font-size: 26px;
  font-weight: 700;
  margin-right: 20px;
  color: #e5e7eb;
  text-decoration: none;
}

.nav-link {
  margin-right: 20px;
  color: #e5e7eb;
  text-decoration: none;
  font-size: 18px;
  font-weight: 600;
}

#brand:hover,
.nav-link:hover {
  color: #ffffff;
  text-shadow: 0 0 8px #8b5cf6, 0 0 15px #22d3ee;
  transition: 0.3s;
}

/* ===== 正文 ===== */
main {
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 20px;
}

/* ===== 页脚 ===== */
footer {
  text-align: center;
  padding: 20px;
  color: #94a3b8;
  font-size: 14px;
  border-top: 1px solid rgba(255,255,255,0.05);
}

footer a {
  color: #94a3b8;
  text-decoration: none;
}
</style>
</head>

<body>

<canvas id="galaxy-bg"></canvas>

<div class="page-content">

<header>
  <div class="nav-left">
    <a href="index.html" id="brand">群星</a>
    <a href="gallery.html" class="nav-link">作品集</a>
    <a href="notes.html" class="nav-link">一些碎碎念...</a>
    <a href="join.html" class="nav-link">加入我们</a>
  </div>
</header>

<main>
  <section class="zoom-section">
    <div class="work-title-wrap">
      <button id="openInfoBtn" class="work-title-btn">M81 &amp; M82</button>
    </div>

    <div class="zoom-wrapper">
      <div class="image-box" id="imageBox">
        <img src="images/M81.jpeg" alt="M81 and M82" id="mainImage">
        <div class="lens" id="lens"></div>
      </div>

      <div class="result-box" id="resultBox"></div>
    </div>
  </section>
</main>
  
<section id="comments" style="max-width:960px;margin:0 auto;padding:20px 20px 40px;">
  <h2>评论</h2>
  <script src="https://utteranc.es/client.js"
          repo="Andy330523/stars"
          issue-term="pathname"
          label="Comment"
          theme="dark-blue"
          crossorigin="anonymous"
          async>
  </script>
</section>

<footer>
  <p>联系：<a href="mailto:AndyZhouChudi@outlook.com">AndyZhouChudi@outlook.com</a></p>
  <p>© 2025 CD的星空 · Andy 在星空下搭建。</p>
</footer>

</div>

<div class="info-panel" id="infoPanel">
  <div class="info-panel-header">
    <h2>详细信息</h2>
    <button id="closeInfoBtn" class="close-btn">×</button>
  </div>

  <div class="info-panel-content">
    <div class="info-item">
      <span class="info-label">目标</span>
      <span class="info-value">M81 Galaxy</span>
    </div>

    <div class="info-item">
      <span class="info-label">拍摄位置</span>
      <span class="info-value">103.691944</span>
    </div>

    <div class="info-item">
      <span class="info-label">单张曝光</span>
      <span class="info-value">300s</span>
    </div>

    <div class="info-item">
      <span class="info-label">堆叠张数</span>
      <span class="info-value">40</span>
    </div>

    <div class="info-item">
      <span class="info-label">拍摄设备</span>
      <span class="info-value">请填写你的主镜 / 相机 / 赤道仪</span>
    </div>
  </div>
</div>

<div class="info-overlay" id="infoOverlay"></div>

<script src="galaxy.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  /* 当前页面高亮 */
  const page = window.location.pathname.split("/").pop();
  document.querySelectorAll("header a").forEach(a => {
    if (a.getAttribute("href") === page) {
      a.classList.add("active");
    }
  });

  /* 页面切换：一次滑出 + 星空冻结 */
  document.querySelectorAll("header a").forEach(link => {
    link.addEventListener("click", e => {
      const href = link.getAttribute("href");
      if (!href || href.startsWith("#")) return;

      e.preventDefault();
      document.body.classList.add("page-exit");
      window.dispatchEvent(new Event("page-exit"));

      setTimeout(() => {
        window.location.href = href;
      }, 500);
    });
  });

  /* 图片放大 */
  const imageBox = document.getElementById("imageBox");
  const mainImage = document.getElementById("mainImage");
  const lens = document.getElementById("lens");
  const resultBox = document.getElementById("resultBox");

  const zoomLevel = 2.5;

  function moveLens(e) {
    const rect = mainImage.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const lensWidth = lens.offsetWidth;
    const lensHeight = lens.offsetHeight;

    let lensX = x - lensWidth / 2;
    let lensY = y - lensHeight / 2;

    if (lensX < 0) lensX = 0;
    if (lensY < 0) lensY = 0;
    if (lensX > rect.width - lensWidth) lensX = rect.width - lensWidth;
    if (lensY > rect.height - lensHeight) lensY = rect.height - lensHeight;

    lens.style.left = lensX + "px";
    lens.style.top = lensY + "px";

    const bgX = -(lensX * zoomLevel);
    const bgY = -(lensY * zoomLevel);

    resultBox.style.backgroundImage = `url('${mainImage.src}')`;
    resultBox.style.backgroundSize = `${rect.width * zoomLevel}px ${rect.height * zoomLevel}px`;
    resultBox.style.backgroundPosition = `${bgX}px ${bgY}px`;
  }

  if (imageBox && mainImage && lens && resultBox) {
    imageBox.addEventListener("mouseenter", () => {
      lens.style.display = "block";
      resultBox.style.display = "block";
    });

    imageBox.addEventListener("mouseleave", () => {
      lens.style.display = "none";
      resultBox.style.display = "none";
    });

    imageBox.addEventListener("mousemove", moveLens);
  }

  /* 详细信息弹窗 */
  const openInfoBtn = document.getElementById("openInfoBtn");
  const closeInfoBtn = document.getElementById("closeInfoBtn");
  const infoPanel = document.getElementById("infoPanel");
  const infoOverlay = document.getElementById("infoOverlay");

  function openPanel() {
    infoPanel.classList.add("show");
    infoOverlay.classList.add("show");
  }

  function closePanel() {
    infoPanel.classList.remove("show");
    infoOverlay.classList.remove("show");
  }

  if (openInfoBtn) openInfoBtn.addEventListener("click", openPanel);
  if (closeInfoBtn) closeInfoBtn.addEventListener("click", closePanel);
  if (infoOverlay) infoOverlay.addEventListener("click", closePanel);
});
</script>

</body>
</html>
