<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>作品集</title>

<style>

/* ===== 作品标题 ===== */
.work-title-wrap{
  margin-bottom:24px;
}

.work-title-btn{
  position:relative;
  display:inline-block;
  background:none;
  border:none;
  padding:0 0 8px 0;
  color:#e5e7eb;
  font-size:40px;
  font-weight:700;
  letter-spacing:0.5px;
  line-height:1.1;
  text-align:left;
  cursor:url("images/pointer.png") 6 0, pointer;
}

.work-title-btn::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg,#8b5cf6,#22d3ee);
  transform:scaleX(0);
  transform-origin:left;
  transition:transform 0.3s ease;
}

.work-title-btn:hover::after{
  transform:scaleX(1);
}

/* ===== 图片展示与鼠标放大 ===== */
.zoom-wrapper{
  display:block;
}

.image-box{
  position:relative;
  width:100%;
  max-width:820px;
  border-radius:16px;
  overflow:hidden;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 20px rgba(0,0,0,0.25);
}

.image-box img{
  width:100%;
  display:block;
}

.zoom-preview{
  position:absolute;
  width:180px;
  height:180px;
  border:1px solid rgba(255,255,255,0.18);
  border-radius:14px;
  background-color:rgba(8,12,22,0.92);
  background-repeat:no-repeat;
  box-shadow:0 8px 28px rgba(0,0,0,0.35);
  pointer-events:none;
  display:none;
  z-index:5;
}

/* ===== 信息面板 ===== */
.info-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(3px);
  opacity:0;
  visibility:hidden;
  transition:0.35s;
  z-index:20;
}

.info-overlay.show{
  opacity:1;
  visibility:visible;
}

.info-panel{
  position:fixed;
  top:0;
  right:0;
  width:380px;
  max-width:90vw;
  height:100vh;
  background:rgba(10,15,26,0.96);
  border-left:1px solid rgba(255,255,255,0.08);
  box-shadow:-10px 0 30px rgba(0,0,0,0.35);
  transform:translateX(100%);
  transition:transform 0.35s ease;
  z-index:30;
  display:flex;
  flex-direction:column;
}

.info-panel.show{
  transform:translateX(0);
}

.info-panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.info-panel-header h2{
  margin:0;
  font-size:22px;
}

.close-btn{
  background:none;
  border:none;
  color:#e5e7eb;
  font-size:28px;
  cursor:url("images/pointer.png") 6 0, pointer;
}

.info-panel-content{
  padding:20px;
}

.info-item{
  display:flex;
  flex-direction:column;
  gap:6px;
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.info-label{
  font-size:13px;
  color:#94a3b8;
}

.info-value{
  font-size:16px;
  color:#e5e7eb;
}

/* ===== 页面动画 ===== */
.page-exit .page-content{
  animation:slideOut 0.5s forwards;
}

@keyframes slideOut{
  from{transform:translateX(0);}
  to{transform:translateX(-100%);}
}

/* ===== 星空背景 ===== */
#galaxy-bg{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* ===== 页面布局 ===== */
.page-content{
  position:relative;
  z-index:1;
}

body{
  font-family:system-ui,sans-serif;
  background:#0b0f1a;
  color:#e5e7eb;
  margin:0;
  line-height:1.6;
  cursor:url("images/cursor.png") 4 4,auto;
}

a,button,.nav-link,#brand{
  cursor:url("images/pointer.png") 6 0,pointer;
}

header{
  position:sticky;
  top:0;
  background:rgba(10,15,26,0.85);
  backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:10px 20px;
  display:flex;
  align-items:center;
}

.nav-left{
  display:flex;
  align-items:center;
}

#brand{
  font-size:26px;
  font-weight:700;
  margin-right:20px;
  color:#e5e7eb;
  text-decoration:none;
}

.nav-link{
  margin-right:20px;
  color:#e5e7eb;
  text-decoration:none;
  font-size:18px;
  font-weight:600;
}

/* 当前页面常亮 */
.nav-link.active,
#brand.active{
  color:#ffffff;
  text-shadow:0 0 8px #8b5cf6, 0 0 15px #22d3ee;
}

/* 鼠标悬浮发光 */
#brand:hover,
.nav-link:hover{
  color:#ffffff;
  text-shadow:0 0 8px #8b5cf6, 0 0 15px #22d3ee;
  transition:0.3s;
}

main{
  max-width:960px;
  margin:0 auto;
  padding:40px 20px;
}

footer{
  text-align:center;
  padding:20px;
  color:#94a3b8;
  font-size:14px;
  border-top:1px solid rgba(255,255,255,0.05);
}

footer a{
  color:#94a3b8;
  text-decoration:none;
}

@media (max-width:900px){
  .work-title-btn{
    font-size:32px;
  }

  .image-box{
    max-width:100%;
  }

  .zoom-preview{
    width:150px;
    height:150px;
  }
}

</style>
</head>

<body>

<canvas id="galaxy-bg"></canvas>

<div class="page-content">

<header>
  <div class="nav-left">
    <a href="index.html" id="brand">群星</a>
    <a href="gallery.html" class="nav-link">作品集</a>
    <a href="notes.html" class="nav-link">一些碎碎念...</a>
    <a href="join.html" class="nav-link">加入我们</a>
  </div>
</header>

<main>
<section class="zoom-section">

<div class="work-title-wrap">
<button id="openInfoBtn" class="work-title-btn">M81 &amp; M82</button>
</div>

<div class="zoom-wrapper">
<div class="image-box" id="imageBox">
<img src="images/M81.jpeg" alt="M81 and M82" id="mainImage">
<div class="zoom-preview" id="resultBox"></div>
</div>
</div>

</section>
</main>

<section id="comments" style="max-width:960px;margin:0 auto;padding:20px 20px 40px;">
<h2>评论</h2>
<script src="https://utteranc.es/client.js"
repo="Andy330523/stars"
issue-term="pathname"
label="Comment"
theme="dark-blue"
crossorigin="anonymous"
async>
</script>
</section>

<footer>
<p>联系：<a href="mailto:AndyZhouChudi@outlook.com">AndyZhouChudi@outlook.com</a></p>
<p>© 2025 CD的星空 · Andy 在星空下搭建。</p>
</footer>

</div>

<div class="info-panel" id="infoPanel">
<div class="info-panel-header">
<h2>详细信息</h2>
<button id="closeInfoBtn" class="close-btn">×</button>
</div>

<div class="info-panel-content">

<div class="info-item">
<span class="info-label">目标</span>
<span class="info-value">M81 Galaxy</span>
</div>

<div class="info-item">
<span class="info-label">拍摄位置</span>
<span class="info-value">31.58°N, 103.74°E</span>
</div>

<div class="info-item">
<span class="info-label">单张曝光</span>
<span class="info-value">300s</span>
</div>

<div class="info-item">
<span class="info-label">堆叠张数</span>
<span class="info-value">4（本来拍了十张可惜有六张都过云了）</span>
</div>

<div class="info-item">
<span class="info-label">拍摄设备</span>
<span class="info-value">锐星 91F / ZWO 2600MC Pro / 晴空 ST17-R</span>
</div>

</div>
</div>

<div class="info-overlay" id="infoOverlay"></div>

<script src="galaxy.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const imageBox = document.getElementById("imageBox");
  const mainImage = document.getElementById("mainImage");
  const resultBox = document.getElementById("resultBox");

  const zoomLevel = 3;

  function moveZoomPreview(e){
    const rect = mainImage.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const previewWidth = resultBox.offsetWidth;
    const previewHeight = resultBox.offsetHeight;

    let previewX = x + 24;
    let previewY = y + 24;

    if (previewX + previewWidth > rect.width){
      previewX = x - previewWidth - 24;
    }

    if (previewY + previewHeight > rect.height){
      previewY = y - previewHeight - 24;
    }

    if (previewX < 0) previewX = 12;
    if (previewY < 0) previewY = 12;

    resultBox.style.left = previewX + "px";
    resultBox.style.top = previewY + "px";

    const bgPosX = -((x * zoomLevel) - previewWidth / 2);
    const bgPosY = -((y * zoomLevel) - previewHeight / 2);

    resultBox.style.backgroundImage = `url('${mainImage.src}')`;
    resultBox.style.backgroundSize = `${rect.width * zoomLevel}px ${rect.height * zoomLevel}px`;
    resultBox.style.backgroundPosition = `${bgPosX}px ${bgPosY}px`;
  }

  if (imageBox){
    imageBox.addEventListener("mouseenter", () => {
      resultBox.style.display = "block";
    });

    imageBox.addEventListener("mouseleave", () => {
      resultBox.style.display = "none";
    });

    imageBox.addEventListener("mousemove", moveZoomPreview);
  }

  const openBtn = document.getElementById("openInfoBtn");
  const closeBtn = document.getElementById("closeInfoBtn");
  const panel = document.getElementById("infoPanel");
  const overlay = document.getElementById("infoOverlay");

  function openPanel(){
    panel.classList.add("show");
    overlay.classList.add("show");
  }

  function closePanel(){
    panel.classList.remove("show");
    overlay.classList.remove("show");
  }

  openBtn.addEventListener("click", openPanel);
  closeBtn.addEventListener("click", closePanel);
  overlay.addEventListener("click", closePanel);

  const page = window.location.pathname.split("/").pop();
  document.querySelectorAll("header a").forEach(a => {
    if (a.getAttribute("href") === page) {
      a.classList.add("active");
    }
  });
});
</script>

</body>
</html>
